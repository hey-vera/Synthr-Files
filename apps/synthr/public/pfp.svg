<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="#0A0A0A" />
  <!-- Large glow effect -->
  <circle cx="200" cy="200" r="140" fill="url(#glow)" opacity="0.1" filter="url(#glow-blur)" />
  <!-- Outer rings -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.4" />
  <circle cx="200" cy="200" r="150" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.2" />
  <!-- Main waveform S shape -->
  <path d="M 100 200 
           Q 100 110, 160 110 
           Q 220 110, 220 200 
           Q 220 290, 160 290 
           Q 100 290, 100 200" 
        fill="none" 
        stroke="url(#glow)" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
  <!-- Center dot -->
  <circle cx="200" cy="200" r="20" fill="url(#glow)" />
  <!-- Decorative dots -->
  <circle cx="200" cy="50" r="6" fill="url(#glow)" opacity="0.6" />
  <circle cx="200" cy="350" r="6" fill="url(#glow)" opacity="0.6" />
  <circle cx="50" cy="200" r="6" fill="url(#glow)" opacity="0.6" />
  <circle cx="350" cy="200" r="6" fill="url(#glow)" opacity="0.6" />
  <!-- Brand text -->
  <text x="200" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F5F5F5" letter-spacing="6">SYNTHR</text>
</svg>