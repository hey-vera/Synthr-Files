<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>
  <!-- Background glow -->
  <circle cx="60" cy="60" r="45" fill="url(#glow)" opacity="0.15" filter="url(#blur)" />
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.6" />
  <!-- Inner ring -->
  <circle cx="60" cy="60" r="38" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.3" />
  <!-- Waveform / S shape -->
  <path d="M 28 60 
           Q 28 35, 50 35 
           Q 72 35, 72 60 
           Q 72 85, 50 85 
           Q 28 85, 28 60" 
        fill="none" 
        stroke="url(#glow)" 
        stroke-width="4" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
  <!-- Center dot -->
  <circle cx="60" cy="60" r="6" fill="url(#glow)" />
  <!-- Decorative dots -->
  <circle cx="60" cy="23" r="2" fill="url(#glow)" opacity="0.5" />
  <circle cx="60" cy="97" r="2" fill="url(#glow)" opacity="0.5" />
  <circle cx="23" cy="60" r="2" fill="url(#glow)" opacity="0.5" />
  <circle cx="97" cy="60" r="2" fill="url(#glow)" opacity="0.5" />
</svg>