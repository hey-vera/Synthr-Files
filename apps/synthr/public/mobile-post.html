<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0A">
    <title>Synthr Daily Post</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0A;
            color: #F5F5F5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #262626;
        }
        .logo { width: 40px; height: 40px; flex-shrink: 0; }
        .title { font-size: 20px; font-weight: 700; }
        .subtitle { color: #737373; font-size: 13px; }
        .streak-bar {
            background: #171717;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .streak-info { display: flex; align-items: center; gap: 10px; }
        .streak-icon { font-size: 24px; }
        .streak-count { font-size: 22px; font-weight: 700; color: #A855F7; }
        .streak-label { font-size: 12px; color: #737373; }
        .streak-btn {
            background: #A855F7;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .streak-btn.done { background: #22C55E; }
        .countdown {
            text-align: center;
            font-size: 13px;
            color: #737373;
            margin-bottom: 16px;
        }
        .countdown span { color: #A855F7; font-weight: 600; }
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            background: #171717;
            border: 1px solid #262626;
            border-radius: 10px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #737373;
            transition: all 0.2s;
        }
        .tab.active {
            background: #A855F7;
            color: white;
        }
        .tab:active { transform: scale(0.95); }
        .content-area { margin-bottom: 16px; }
        .card {
            background: #171717;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 14px;
        }
        .card-label {
            font-size: 11px;
            color: #A855F7;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .card-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .card-tagline { color: #A3A3A3; font-size: 14px; margin-bottom: 14px; }
        .card-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .meta-tag {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #262626;
            color: #A3A3A3;
        }
        .content-box {
            background: #0A0A0A;
            border: 1px solid #262626;
            border-radius: 10px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 12px;
            max-height: 320px;
            overflow-y: auto;
        }
        .content-box::-webkit-scrollbar { width: 4px; }
        .content-box::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-purple {
            background: #A855F7;
            color: white;
        }
        .btn-purple:active { background: #9333EA; transform: scale(0.97); }
        .btn-green {
            background: #22C55E;
            color: white;
        }
        .btn-green:active { background: #16A34A; transform: scale(0.97); }
        .btn-gray {
            background: #262626;
            color: #F5F5F5;
        }
        .btn-gray:active { background: #404040; transform: scale(0.97); }
        .btn-full { width: 100%; margin-top: 8px; }
        .btn.done { background: #166534; }
        .week-view { margin-top: 16px; }
        .week-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: #171717;
            border: 1px solid #262626;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .week-day { font-size: 12px; color: #737373; width: 50px; flex-shrink: 0; }
        .week-tool { flex: 1; font-size: 14px; }
        .week-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .status-today { background: #F59E0B; color: white; }
        .status-done { background: #22C55E; color: white; }
        .status-pending { background: #262626; color: #A3A3A3; }
        .hidden { display: none; }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #22C55E;
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: all 0.2s;
            pointer-events: none;
        }
        .toast.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .tips-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 14px;
            font-size: 13px;
            color: #a3a3a3;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .tips-box strong { color: #F5F5F5; }
        .nav-footer {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #262626;
        }
        .nav-btn {
            flex: 1;
            padding: 12px;
            background: #171717;
            border: 1px solid #262626;
            border-radius: 10px;
            color: #737373;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }
        .nav-btn.active { background: #262626; color: #F5F5F5; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <svg class="logo" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1"/>
                    <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1"/>
                </linearGradient>
            </defs>
            <circle cx="60" cy="60" r="45" fill="url(#glow)" opacity="0.15"/>
            <circle cx="60" cy="60" r="42" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
            <path d="M 28 60 Q 28 35, 50 35 Q 72 35, 72 60 Q 72 85, 50 85 Q 28 85, 28 60" fill="none" stroke="url(#glow)" stroke-width="4" stroke-linecap="round"/>
            <circle cx="60" cy="60" r="6" fill="url(#glow)"/>
        </svg>
        <div>
            <div class="title">Synthr</div>
            <div class="subtitle">Daily Post &middot; <span id="currentDate"></span></div>
        </div>
    </div>

    <div class="streak-bar">
        <div class="streak-info">
            <div class="streak-icon">🔥</div>
            <div>
                <div class="streak-count" id="streakCount">0</div>
                <div class="streak-label">day streak</div>
            </div>
        </div>
        <button class="streak-btn" id="markDoneBtn" onclick="markTodayDone()">Mark Done</button>
    </div>

    <div class="countdown" id="countdown">Next post window: <span>calculating...</span></div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('twitter')" id="tab-twitter">Twitter</button>
        <button class="tab" onclick="switchTab('reddit')" id="tab-reddit">Reddit</button>
        <button class="tab" onclick="switchTab('linkedin')" id="tab-linkedin">LinkedIn</button>
    </div>

    <div id="todayView" class="content-area">
        <div class="card">
            <div class="card-label">Today</div>
            <div class="card-title" id="toolName">Loading...</div>
            <div class="card-tagline" id="toolTagline">Loading...</div>
            <div class="card-meta" id="toolMeta"></div>

            <div class="content-box" id="postContent">Loading...</div>

            <div class="tips-box" id="tipsBox">
                <strong>Tips:</strong> Post between 9-11am EST for best engagement. Add a relevant image if you have one.
            </div>

            <div class="btn-group">
                <button class="btn btn-purple" onclick="copyContent()">
                    <span>&#128203;</span> Copy
                </button>
                <button class="btn btn-green" onclick="postNow()">
                    <span>&#10132;</span> Post Now
                </button>
            </div>

            <button class="btn btn-gray btn-full" onclick="showWeek()">
                &#128197; View Week Schedule
            </button>
        </div>
    </div>

    <div id="weekView" class="hidden content-area">
        <div class="card">
            <div class="card-label">This Week</div>
            <div class="week-view" id="weekList">Loading...</div>
            <button class="btn btn-gray btn-full" onclick="showToday()" style="margin-top:12px">
                &#11013; Back to Today
            </button>
        </div>
    </div>

    <div class="nav-footer">
        <div class="nav-btn active" onclick="showToday()" id="nav-today">Today</div>
        <div class="nav-btn" onclick="showWeek()" id="nav-week">Week</div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
        const toolsData = [
            {"id":"midjourney","name":"Midjourney","tagline":"Stunning AI image generation","description":"Midjourney remains the gold standard for AI image generation. Its V6 engine produces photorealistic images with exceptional detail and coherent text rendering. Perfect for concept art, marketing visuals, and creative exploration.","category":"Image Generation","features":["V6 engine","Style tuning","Pan & zoom","Variations"],"pros":["Best-in-class quality","Strong community","Consistent updates"],"cons":["Discord-only interface","No free tier","Steep learning curve"],"pricing":"From $10/mo"},
            {"id":"framer","name":"Framer","tagline":"Design and publish sites in minutes","description":"Framer is a professional design tool that lets you build production-ready websites directly from your canvas. Its AI features help generate layouts, copy, and responsive designs. The affiliate program is generous, and the tool is genuinely loved by designers making the leap from Figma to live sites.","category":"UI/UX Design","features":["AI layout generation","Figma import","CMS","Hosting"],"pros":["Production-ready output","Figma-like workflow","Fast publishing"],"cons":["Less flexible than code","Learning curve for devs"],"pricing":"From $15/mo"},
            {"id":"remove-bg","name":"Remove.bg","tagline":"Remove image backgrounds automatically","description":"Remove.bg uses AI to detect subjects and remove backgrounds in seconds. It is the most reliable tool for this specific task, with excellent edge detection on hair and fur. The free tier is generous for low-volume use, and the API is rock-solid for integrations.","category":"Photo Editing","features":["One-click removal","API access","Photoshop plugin","Bulk processing"],"pros":["Incredible accuracy","Very fast","Great API"],"cons":["Limited to one task","Subscription for heavy use"],"pricing":"Free / From $9/mo"},
            {"id":"looka","name":"Looka","tagline":"AI-powered logo design","description":"Looka generates professional logos and brand kits based on your preferences. You pick styles, colors, and symbols, and the AI generates dozens of options. The brand kit add-on includes social media templates, business card designs, and brand guidelines.","category":"Logo & Branding","features":["Logo generation","Brand kit","Social templates","Business cards"],"pros":["Fast results","High-quality output","Full brand kit"],"cons":["Can feel generic","Limited customization"],"pricing":"From $20 one-time"},
            {"id":"magician","name":"Magician","tagline":"AI design tools inside Figma","description":"Magician is a Figma plugin that brings AI directly into your design workflow. It can generate icons, copy, and images from text prompts without leaving your canvas. For designers who live in Figma, this removes the friction of switching between tools.","category":"Productivity","features":["Icon generation","Copy generation","Image generation","Text to SVG"],"pros":["Works inside Figma","Great for ideation","Fast icon creation"],"cons":["Requires Figma subscription","Limited free credits"],"pricing":"Free / From $9/mo"},
            {"id":"canva","name":"Canva","tagline":"Design anything with AI magic","description":"Canva's Magic Studio brings AI to the world's most popular design platform. Magic Write generates copy, Magic Edit transforms images, and Magic Design creates entire presentations from a prompt. It's the best choice for non-designers and marketers who need to create professional visuals quickly.","category":"UI/UX Design","features":["Magic Write","Magic Edit","Magic Design","Brand Kit"],"pros":["Extremely easy to use","Huge template library","Great for teams"],"cons":["Less precise than pro tools","Can feel limiting"],"pricing":"Free / From $13/mo"},
            {"id":"dalle3","name":"DALL-E 3","tagline":"OpenAI's latest image generation","description":"DALL-E 3 is OpenAI's most advanced image generation model, available through ChatGPT Plus and the API. It excels at understanding complex prompts with multiple objects and relationships. The integration with ChatGPT makes it incredibly accessible.","category":"Image Generation","features":["ChatGPT integration","API access","Complex prompts","Text rendering"],"pros":["Excellent prompt understanding","Easy to use","Great text in images"],"cons":["Requires ChatGPT Plus","Limited customization"],"pricing":"From $20/mo"},
            {"id":"uizard","name":"Uizard","tagline":"AI-powered UI design tool","description":"Uizard turns sketches and text prompts into editable UI designs. Upload a hand-drawn wireframe or describe your app, and Uizard generates a full mockup. It's perfect for rapid prototyping and ideation.","category":"UI/UX Design","features":["Sketch to UI","Text to design","Design-to-code","Collaboration"],"pros":["Fast prototyping","Sketch recognition","Easy collaboration"],"cons":["Limited fidelity","Not for final designs"],"pricing":"Free / From $15/mo"},
            {"id":"runway","name":"Runway ML","tagline":"AI video generation and editing","description":"Runway ML is the leading AI video editing platform. Gen-3 generates high-quality video from text and images, while Motion Brush lets you animate specific parts of an image. It's essential for video creators and motion designers.","category":"3D & Motion","features":["Gen-3 video","Motion Brush","Infinite Image","Video editing"],"pros":["Best AI video quality","Intuitive interface","Rapid updates"],"cons":["Expensive for heavy use","Limited free credits"],"pricing":"From $15/mo"},
            {"id":"adobe-firefly","name":"Adobe Firefly","tagline":"Safe AI for commercial design","description":"Adobe Firefly is the only AI image generator trained on Adobe Stock and public domain content, making it commercially safe. Integrated into Photoshop, Illustrator, and Express, it lets you generate, extend, and fill images non-destructively.","category":"Image Generation","features":["Commercially safe","Photoshop integration","Generative fill","Text effects"],"pros":["Legally safe for commercial use","Adobe ecosystem","Non-destructive"],"cons":["Quality behind Midjourney","Requires Adobe subscription"],"pricing":"Free / From $10/mo"},
            {"id":"figma-ai","name":"Figma AI","tagline":"Native AI features in Figma","description":"Figma AI brings generative features directly into the design tool you already use. Auto-layout suggestions, AI-generated images, and first-draft designs from prompts are now built-in. As a native feature, it understands your design system better than any plugin.","category":"UI/UX Design","features":["First drafts","AI images","Auto layout","Asset search"],"pros":["Native integration","Understands design systems","No context switching"],"cons":["Requires Figma subscription","Limited to Figma workflows"],"pricing":"Free / From $15/mo"},
            {"id":"gamma","name":"Gamma","tagline":"AI-powered presentations","description":"Gamma creates beautiful presentations, documents, and websites from a single text prompt. The AI handles layout, typography, and visual design so you can focus on content. The one-page scroll format is modern and engaging.","category":"Presentation","features":["Text to deck","One-page docs","AI images","Analytics"],"pros":["Beautiful output","Fast creation","Modern format"],"cons":["Limited offline use","Less flexible than PowerPoint"],"pricing":"Free / From $10/mo"},
            {"id":"clipdrop","name":"Clipdrop","tagline":"Stable Diffusion tools for creators","description":"Clipdrop by Stability AI provides a suite of AI image editing tools including relighting, upscaling, background removal, and generative fill. The API-first approach makes it perfect for developers and designers building AI-powered products.","category":"Photo Editing","features":["Relighting","Upscale","Remove background","Generative fill"],"pros":["Great API","Affordable","Multiple tools in one"],"cons":["Brand recognition lower","Interface less polished"],"pricing":"Free / From $7/mo"},
            {"id":"spline","name":"Spline","tagline":"3D design with AI features","description":"Spline makes 3D design accessible to everyone with AI-powered features that generate textures, animate objects, and convert 2D to 3D. The web-based editor requires no installation and the real-time collaboration is excellent.","category":"3D & Motion","features":["AI textures","2D to 3D","Real-time collaboration","Web export"],"pros":["Easy 3D for beginners","Web-based","Great for web projects"],"cons":["Less powerful than Blender","Limited advanced features"],"pricing":"Free / From $9/mo"},
            {"id":"stable-diffusion","name":"Stable Diffusion","tagline":"Open-source AI image generation","description":"Stable Diffusion is the open-source AI image model that powers countless tools and workflows. Run it locally for unlimited, free generation, or use it through various platforms. SDXL and SD3 models offer quality comparable to proprietary alternatives.","category":"Image Generation","features":["Local generation","Custom models","Inpainting","ControlNet"],"pros":["Completely free","Private","Unlimited generation","Highly customizable"],"cons":["Requires GPU","Technical setup","Steeper learning curve"],"pricing":"Free (self-hosted)"}
        ];

        const startDate = new Date('2026-06-07');
        let currentPlatform = 'twitter';
        let currentTool = null;
        let todayKey = null;

        function getTodayData() {
            const today = new Date();
            const diffTime = Math.abs(today - startDate);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const index = diffDays % toolsData.length;
            return {
                tool: toolsData[index],
                day: diffDays + 1,
                index: index
            };
        }

        function getWeekData() {
            const today = new Date();
            const diffDays = Math.floor(Math.abs(today - startDate) / (1000 * 60 * 60 * 24));
            const week = [];
            for (let i = 0; i < 7; i++) {
                const idx = (diffDays + i) % toolsData.length;
                const d = new Date();
                d.setDate(d.getDate() + i);
                const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
                const dayNum = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                week.push({
                    dayName: dayName + ' ' + dayNum,
                    toolName: toolsData[idx].name,
                    isToday: i === 0,
                    isPosted: isPosted(d)
                });
            }
            return week;
        }

        function generateTwitter(tool) {
            const pro = tool.pros[0] || 'Easy to use';
            const price = tool.pricing.includes('Free') ? 'Free to start' : tool.pricing;
            const tag = tool.name.replace(/\s/g, '');
            return `${tool.tagline} with ${tool.name}. ${pro}. ${price}.

Review: https://synthr.online/tool/${tool.id}

#${tag} #AI`;
        }

        function generateReddit(tool) {
            return `[Review] ${tool.name} — ${tool.tagline}

${tool.description}

**What it does:** ${tool.features.join(', ')}

**Pricing:** ${tool.pricing}

**Best for:** ${tool.category}

**Pros:**
- ${tool.pros[0]}
- ${tool.pros[1]}

**Cons:**
- ${tool.cons[0]}

I've been testing this for a week. Happy to answer questions about my experience.

Anyone else using ${tool.name}?`;
        }

        function generateLinkedIn(tool) {
            return `AI Design Tool Spotlight: ${tool.name}

${tool.description}

Key features:
• ${tool.features[0]}
• ${tool.features[1]}
• ${tool.features[2]}

${tool.pricing}

Full review: https://synthr.online/tool/${tool.id}

#${tool.name.replace(/\s/g, '')} #AI #DesignTools #Productivity`;
        }

        function getPlatformContent(platform, tool) {
            if (platform === 'twitter') return generateTwitter(tool);
            if (platform === 'reddit') return generateReddit(tool);
            if (platform === 'linkedin') return generateLinkedIn(tool);
            return generateTwitter(tool);
        }

        function getPlatformUrl(platform, tool) {
            const text = encodeURIComponent(generateTwitter(tool).slice(0, 280));
            if (platform === 'twitter') return `https://twitter.com/intent/tweet?text=${text}`;
            if (platform === 'reddit') return `https://www.reddit.com/r/webdesign/submit?title=${encodeURIComponent('[Review] ' + tool.name + ' — ' + tool.tagline)}&url=https://synthr.online/tool/${tool.id}`;
            if (platform === 'linkedin') return `https://www.linkedin.com/sharing/share-offsite/?url=https://synthr.online/tool/${tool.id}`;
            return '#';
        }

        function getPlatformTips(platform) {
            if (platform === 'twitter') return '<strong>Tips:</strong> Post between 9-11am EST. Add a relevant image. Use 2-3 hashtags max. Reply to comments within 30 mins.';
            if (platform === 'reddit') return '<strong>Tips:</strong> Post in r/webdesign, r/Design, or r/Entrepreneur. Add value before linking. Respond to all comments for 2 hours.';
            if (platform === 'linkedin') return '<strong>Tips:</strong> Post Tue-Thu 8-10am EST. Tag the tool company if possible. Write a thoughtful comment, not just a link.';
            return '';
        }

        function switchTab(platform) {
            currentPlatform = platform;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + platform).classList.add('active');
            if (currentTool) {
                renderContent();
            }
        }

        function renderContent() {
            const content = getPlatformContent(currentPlatform, currentTool);
            const tips = getPlatformTips(currentPlatform);
            document.getElementById('postContent').textContent = content;
            document.getElementById('tipsBox').innerHTML = tips;
        }

        function loadToday() {
            const data = getTodayData();
            currentTool = data.tool;
            todayKey = new Date().toISOString().split('T')[0];

            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            document.getElementById('toolName').textContent = data.tool.name;
            document.getElementById('toolTagline').textContent = data.tool.tagline;
            document.getElementById('toolMeta').innerHTML = `
                <span class="meta-tag">${data.tool.category}</span>
                <span class="meta-tag">${data.tool.pricing}</span>
                <span class="meta-tag">Day ${data.day}</span>
            `;
            renderContent();
            updateStreak();
            updateCountdown();
            checkPostedStatus();
        }

        function copyContent() {
            const content = document.getElementById('postContent').textContent;
            navigator.clipboard.writeText(content).then(() => {
                showToast('Copied!');
            });
        }

        function postNow() {
            const url = getPlatformUrl(currentPlatform, currentTool);
            window.open(url, '_blank');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function isPosted(date) {
            const key = date.toISOString().split('T')[0];
            const posted = JSON.parse(localStorage.getItem('synthr_posted') || '{}');
            return posted[key]?.done || false;
        }

        function checkPostedStatus() {
            const posted = JSON.parse(localStorage.getItem('synthr_posted') || '{}');
            if (posted[todayKey]?.done) {
                const btn = document.getElementById('markDoneBtn');
                btn.textContent = 'Done';
                btn.classList.add('done');
                btn.disabled = true;
            }
        }

        function markTodayDone() {
            const posted = JSON.parse(localStorage.getItem('synthr_posted') || '{}');
            if (!posted[todayKey]) posted[todayKey] = {};
            posted[todayKey].done = true;
            posted[todayKey].platforms = posted[todayKey].platforms || [];
            if (!posted[todayKey].platforms.includes(currentPlatform)) {
                posted[todayKey].platforms.push(currentPlatform);
            }
            localStorage.setItem('synthr_posted', JSON.stringify(posted));
            const btn = document.getElementById('markDoneBtn');
            btn.textContent = 'Done';
            btn.classList.add('done');
            showToast('Marked done!');
            updateStreak();
        }

        function updateStreak() {
            const posted = JSON.parse(localStorage.getItem('synthr_posted') || '{}');
            let streak = 0;
            const today = new Date();
            for (let i = 0; i < 365; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const key = d.toISOString().split('T')[0];
                if (posted[key]?.done) {
                    streak++;
                } else if (i > 0) {
                    break;
                }
            }
            document.getElementById('streakCount').textContent = streak;
        }

        function updateCountdown() {
            const now = new Date();
            const est = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            const target = new Date(est);
            target.setHours(9, 0, 0, 0);
            if (est.getHours() >= 9) {
                target.setDate(target.getDate() + 1);
            }
            const diff = target - est;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const el = document.getElementById('countdown');
            if (hours === 0 && mins === 0) {
                el.innerHTML = 'Post window: <span>NOW</span>';
            } else {
                el.innerHTML = `Next post window: <span>${hours}h ${mins}m</span> (9am EST)`;
            }
        }

        function showWeek() {
            document.getElementById('todayView').classList.add('hidden');
            document.getElementById('weekView').classList.remove('hidden');
            document.getElementById('weekView').classList.add('fade-in');
            document.getElementById('nav-today').classList.remove('active');
            document.getElementById('nav-week').classList.add('active');

            const week = getWeekData();
            const weekList = document.getElementById('weekList');
            weekList.innerHTML = week.map(day => `
                <div class="week-item">
                    <div class="week-day">${day.dayName}</div>
                    <div class="week-tool">${day.toolName}</div>
                    <div class="week-status ${day.isToday ? 'status-today' : (day.isPosted ? 'status-done' : 'status-pending')}">
                        ${day.isToday ? 'TODAY' : (day.isPosted ? 'Done' : 'Pending')}
                    </div>
                </div>
            `).join('');
        }

        function showToday() {
            document.getElementById('weekView').classList.add('hidden');
            document.getElementById('todayView').classList.remove('hidden');
            document.getElementById('todayView').classList.add('fade-in');
            document.getElementById('nav-week').classList.remove('active');
            document.getElementById('nav-today').classList.add('active');
        }

        // Init
        loadToday();
        setInterval(updateCountdown, 60000);
    </script>
</body>
</html>
